<!doctype html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>لوحة تحكم الشرقاوي</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', sans-serif;
            background: #0f0f0f;
            color: #eee;
            padding-top: 62px;
            padding-bottom: 72px;
            min-height: 100vh;
        }

        /* ===== FIXED TOP HEADER (Amazon-style) ===== */
        .top-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: #131921;
            display: flex;
            align-items: center;
            padding: 6px 16px;
            gap: 8px;
            height: 62px;
            direction: rtl;
        }
        .header-logo {
            display: flex;
            align-items: center;
            gap: 4px;
            color: #fff;
            text-decoration: none;
            flex-shrink: 0;
        }
        .header-logo .logo-icon {
            font-size: 26px;
            line-height: 1;
        }
        .header-logo .logo-text {
            font-size: 15px;
            font-weight: 800;
            color: #ff9800;
            white-space: nowrap;
            line-height: 1.1;
        }
        .header-logo .logo-sub {
            font-size: 10px;
            color: #aaa;
            font-weight: 600;
            display: block;
            line-height: 1;
        }

        .header-search {
            flex: 1;
            display: flex;
            align-items: center;
            max-width: 520px;
            margin: 0 8px;
            border-radius: 8px;
            overflow: hidden;
            border: 2px solid transparent;
            transition: 0.2s;
            background: #fff;
        }
        .header-search:focus-within {
            border-color: #ff9800;
        }
        .header-search input {
            flex: 1;
            border: none;
            padding: 9px 12px;
            font-size: 13px;
            font-family: 'Cairo', sans-serif;
            outline: none;
            background: #fff;
            color: #222;
            min-width: 0;
        }
        .header-search input::placeholder {
            color: #999;
        }
        .header-search button {
            background: #febd69;
            border: none;
            padding: 9px 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #222;
            font-size: 16px;
            flex-shrink: 0;
            transition: 0.2s;
        }
        .header-search button:hover {
            background: #f3a847;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
        }
        .header-actions .ha-btn {
            background: none;
            border: 1px solid transparent;
            color: #ddd;
            padding: 4px 8px;
            border-radius: 6px;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            font-size: 12px;
            font-weight: 600;
            transition: 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            line-height: 1.2;
            white-space: nowrap;
        }
        .header-actions .ha-btn:hover {
            border-color: rgba(255,255,255,0.2);
        }
        .header-actions .ha-btn .ha-icon {
            font-size: 16px;
        }
        .header-actions .ha-btn .ha-label {
            font-size: 9px;
            color: #aaa;
        }

        /* ===== MAINTENANCE PANEL ===== */
        .maintenance-panel {
            background: #1a1a2e;
            border: 1px solid #2a2a3e;
            border-radius: 16px;
            padding: 30px;
            text-align: center;
            max-width: 400px;
            margin: 20px auto;
        }
        .maintenance-panel h2 {
            font-size: 20px;
            margin-bottom: 8px;
            color: #fff;
        }
        .maintenance-panel p {
            color: #888;
            font-size: 13px;
            margin-bottom: 24px;
        }
        .maintenance-toggle-wrap {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 16px 20px;
            margin-bottom: 16px;
        }
        .maintenance-toggle-wrap .mt-label {
            font-size: 15px;
            font-weight: 600;
            color: #eee;
        }
        .maintenance-toggle {
            width: 56px;
            height: 30px;
            background: #333;
            border-radius: 15px;
            position: relative;
            cursor: pointer;
            transition: background 0.3s;
        }
        .maintenance-toggle.on { background: #ff9800; }
        .maintenance-toggle::after {
            content: '';
            position: absolute;
            width: 24px;
            height: 24px;
            background: #fff;
            border-radius: 50%;
            top: 3px;
            right: 3px;
            transition: transform 0.3s;
        }
        .maintenance-toggle.on::after {
            transform: translateX(-26px);
        }
        .maintenance-status {
            display: inline-block;
            padding: 6px 18px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 16px;
        }
        .maintenance-status.off { background: rgba(76,175,80,0.15); color: #4caf50; }
        .maintenance-status.on { background: rgba(255,152,0,0.15); color: #ff9800; }
        .maintenance-info {
            margin-top: 16px;
            padding: 12px;
            background: rgba(255,255,255,0.03);
            border-radius: 10px;
            font-size: 12px;
            color: #666;
            line-height: 1.8;
        }
        .maintenance-info code {
            background: rgba(255,152,0,0.15);
            color: #ff9800;
            padding: 2px 8px;
            border-radius: 5px;
            font-size: 11px;
        }

        /* ===== MAIN CONTENT ===== */
        .main-content {
            padding: 12px 16px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* stats bar */
        .stats-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 14px;
            flex-wrap: wrap;
        }
        .stats-bar .stat-box {
            flex: 1;
            min-width: 80px;
            background: #1a1a2e;
            border: 1px solid #2a2a3e;
            border-radius: 10px;
            padding: 10px 12px;
            text-align: center;
        }
        .stats-bar .stat-box .stat-num {
            font-size: 20px;
            font-weight: 800;
            color: #ff9800;
            line-height: 1.2;
        }
        .stats-bar .stat-box .stat-label {
            font-size: 10px;
            color: #888;
            font-weight: 600;
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* ===== ORDERS ===== */
        .orders-grid { display: flex; flex-direction: column; gap: 10px; }
        .order-card {
            background: #1a1a2e;
            border: 1px solid #2a2a3e;
            border-radius: 12px;
            padding: 14px 16px;
            border-right: 3px solid #ff9800;
            transition: 0.2s;
        }
        .order-card:hover { border-color: #ff9800; }
        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            flex-wrap: wrap;
            gap: 6px;
        }
        .order-id { font-weight: 700; font-size: 14px; color: #ff9800; }
        .order-date { font-size: 11px; color: #777; }
        .order-body {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px 14px;
            font-size: 13px;
        }
        .order-body .label { color: #777; font-size: 11px; }
        .order-body .value { color: #eee; font-weight: 600; }
        .order-items { grid-column: 1 / -1; margin-top: 2px; }
        .order-items .items-list {
            background: rgba(255,255,255,0.03);
            border-radius: 6px;
            padding: 8px 12px;
            font-size: 12px;
            color: #bbb;
            line-height: 1.7;
            white-space: pre-line;
            font-weight: 500;
        }
        .order-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #2a2a3e;
            flex-wrap: wrap;
            gap: 6px;
        }
        .status-badge {
            padding: 3px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            font-family: 'Cairo', sans-serif;
        }
        .status-pending { background: #f57c0011; color: #f57c00; border: 1px solid #f57c0033; }
        .status-processing { background: #2196f311; color: #2196f3; border: 1px solid #2196f333; }
        .status-delivered { background: #4caf5011; color: #4caf50; border: 1px solid #4caf5033; }
        .status-cancelled { background: #f4433611; color: #f44336; border: 1px solid #f4433633; }
        .status-select {
            background: #1a1a2e;
            color: #eee;
            border: 1px solid #333;
            border-radius: 6px;
            padding: 5px 10px;
            font-size: 12px;
            font-family: 'Cairo', sans-serif;
            cursor: pointer;
            outline: none;
        }
        .status-select:focus { border-color: #ff9800; }
        .save-status-btn {
            background: #ff9800;
            color: #fff;
            border: none;
            padding: 5px 14px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 700;
            font-family: 'Cairo', sans-serif;
            cursor: pointer;
        }
        .save-status-btn:hover { background: #f57c00; }
        .save-status-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .order-rating {
            display: flex;
            align-items: center;
            gap: 4px;
            margin-top: 6px;
            padding: 6px 0;
            border-top: 1px solid #2a2a3e;
        }
        .order-rating .label { color: #777; font-size: 11px; margin-left: 6px; }
        .rating-stars { color: #444; font-size: 16px; letter-spacing: 2px; }
        .rating-stars .star-filled { color: #ffc107; }

        /* ===== PRODUCTS ===== */
        .products-grid { display: block; }
        .admin-section-box { margin-bottom: 20px; }
        .admin-section-title {
            font-size: 16px;
            font-weight: 700;
            color: #fff;
            background: #1a1a2e;
            padding: 8px 15px;
            border-radius: 10px;
            margin-bottom: 8px;
            text-align: right;
            font-family: 'Cairo', sans-serif;
        }
        .admin-products-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            justify-content: center;
        }
        .product-card {
            background: rgba(37, 37, 37, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 152, 0, 0.3);
            border-radius: 20px;
            padding: 5px;
            text-align: center;
            width: 140px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 8px 15px rgba(0,0,0,0.3);
        }
        .product-card:hover { border-color: #ff9800; box-shadow: 0 15px 25px rgba(255,152,0,0.2); transform: translateY(-2px); }
        .product-card.reorder-active { border-color: #ff9800; box-shadow: 0 0 15px rgba(255,152,0,0.3); }
        .product-card img {
            width: 135px;
            height: 130px;
            object-fit: cover;
            border-radius: 15%;
            background: #fff;
            margin-bottom: -10px;
        }
        .product-card .p-name { font-size: 12px; font-weight: 600; color: #ccc; padding: 0.5rem; }
        .product-card .p-price { font-size: 14px; font-weight: 800; color: #ff9800; }

        .toolbar {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }
        .add-product-btn {
            background: #ff9800;
            color: #fff;
            border: none;
            padding: 10px 18px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 700;
            font-family: 'Cairo', sans-serif;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .add-product-btn:hover { background: #f57c00; }
        .import-btn {
            background: #4a5568;
            color: #fff;
            border: none;
            padding: 10px 16px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 700;
            font-family: 'Cairo', sans-serif;
            cursor: pointer;
        }
        .import-btn:hover { background: #4a5568; opacity: 0.9; }
        .p-reorder {
            display: flex;
            gap: 4px;
            justify-content: center;
            margin-top: 6px;
        }
        .p-reorder button {
            background: #333;
            color: #ff9800;
            border: 1px solid #555;
            width: 32px;
            height: 28px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            transition: all 0.2s;
        }
        .p-reorder button:hover { background: #ff9800; color: #000; }
        .p-reorder button:disabled { opacity: 0.3; cursor: not-allowed; }
        .product-card.reorder-active { border: 2px solid #ff9800; cursor: grab; }
        .reorder-section { margin-bottom: 8px; }

        /* ===== CUSTOMERS ===== */
        .customers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 10px;
        }
        .customer-card {
            background: #1a1a2e;
            border: 1px solid #2a2a3e;
            border-radius: 12px;
            padding: 14px 16px;
            border-right: 3px solid #2196f3;
        }
        .customer-card .c-name { font-size: 15px; font-weight: 700; color: #eee; }
        .customer-card .c-phone { font-size: 13px; color: #aaa; margin-top: 3px; direction: ltr; text-align: right; }
        .customer-card .c-address { font-size: 12px; color: #888; margin-top: 5px; }
        .customer-card .c-date { font-size: 10px; color: #666; margin-top: 6px; }
        .customer-card .c-orders-count {
            font-size: 11px;
            color: #ff9800;
            margin-top: 6px;
            background: rgba(255,152,0,0.1);
            padding: 3px 10px;
            border-radius: 8px;
            display: inline-block;
        }

        /* ===== MODAL ===== */
        .product-modal {
            padding: 0;
            border: none;
            border-radius: 0;
            width: 100%;
            height: 100%;
            max-width: 100%;
            max-height: 100%;
            background: #1a1a2e;
            color: #fff;
            margin: 0;
            z-index: 9999;
            direction: rtl;
        }
        .product-modal[open] { display: flex; flex-direction: column; }
        .product-modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 18px;
            border-bottom: 1px solid #333;
            background: #131921;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .product-modal-header h2 { font-size: 18px; font-weight: 700; color: #fff; font-family: 'Cairo', sans-serif; }
        .product-modal-close {
            background: rgba(255,255,255,0.06);
            border: none;
            color: #aaa;
            font-size: 18px;
            cursor: pointer;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .product-modal-close:hover { background: rgba(255,68,68,0.15); color: #ff4444; }
        .product-modal-body {
            flex: 1;
            overflow-y: auto;
            padding: 18px;
        }
        .product-modal-body label {
            display: block;
            font-size: 12px;
            color: #888;
            margin-bottom: 3px;
            margin-top: 10px;
        }
        .product-modal-body input, .product-modal-body textarea, .product-modal-body select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #333;
            border-radius: 8px;
            background: #222;
            color: #eee;
            font-size: 13px;
            font-family: 'Cairo', sans-serif;
            outline: none;
        }
        .product-modal-body input:focus, .product-modal-body textarea:focus { border-color: #ff9800; }
        .product-modal-body textarea { min-height: 70px; resize: vertical; }
        .product-modal-footer {
            display: flex;
            gap: 10px;
            padding: 14px 18px;
            border-top: 1px solid #333;
            background: #131921;
        }
        .product-modal-footer button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 700;
            font-family: 'Cairo', sans-serif;
            cursor: pointer;
        }
        .product-modal-footer .p-save { background: #ff9800; color: #fff; }
        .product-modal-footer .p-save:hover { background: #f57c00; }
        .product-modal-footer .p-cancel { background: #333; color: #aaa; }
        .product-modal-footer .p-cancel:hover { background: #444; }
        .product-modal-footer .p-delete-modal { background: #f44336; color: #fff; flex: 0.5; }
        .product-modal-footer .p-delete-modal:hover { background: #d32f2f; }

        dialog::backdrop { background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); }

        /* ===== FIXED BOTTOM NAV (Amazon-style) ===== */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: #131921;
            display: flex;
            align-items: center;
            justify-content: space-around;
            padding: 4px 0 6px;
            height: 62px;
            direction: rtl;
            border-top: 1px solid #2a2a3e;
        }
        .bottom-nav .bn-item {
            background: none;
            border: none;
            color: #888;
            font-family: 'Cairo', sans-serif;
            font-size: 10px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1px;
            padding: 2px 8px;
            transition: 0.2s;
            position: relative;
            flex: 1;
            max-width: 80px;
        }
        .bottom-nav .bn-item .bn-icon {
            font-size: 20px;
            line-height: 1.2;
        }
        .bottom-nav .bn-item .bn-label {
            font-size: 10px;
            line-height: 1.2;
        }
        .bottom-nav .bn-item:hover { color: #ccc; }
        .bottom-nav .bn-item.active { color: #fff; }
        .bottom-nav .bn-item.active::after {
            content: '';
            position: absolute;
            top: -4px;
            left: 50%;
            transform: translateX(-50%);
            width: 24px;
            height: 2px;
            background: #ff9800;
            border-radius: 0 0 2px 2px;
        }

        /* ===== COMMON ===== */
        .loading { text-align: center; padding: 50px 16px; color: #888; font-size: 14px; }
        .empty { text-align: center; padding: 50px 16px; color: #666; font-size: 14px; }
        .error { text-align: center; padding: 50px 16px; color: #ff4444; font-size: 14px; }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 600px) {
            body { padding-top: 56px; padding-bottom: 66px; }
            .top-header { height: 56px; padding: 4px 10px; gap: 6px; }
            .header-logo .logo-text { font-size: 13px; }
            .header-logo .logo-sub { font-size: 9px; }
            .header-logo .logo-icon { font-size: 22px; }
            .header-search { max-width: 100%; }
            .header-search input { padding: 7px 10px; font-size: 12px; }
            .header-search button { padding: 7px 10px; font-size: 14px; }
            .header-actions .ha-btn { padding: 2px 5px; }
            .header-actions .ha-btn .ha-icon { font-size: 14px; }
            .header-actions .ha-btn .ha-label { display: none; }

            .main-content { padding: 8px 10px; }

            .stats-bar .stat-box { min-width: 60px; padding: 8px; }
            .stats-bar .stat-box .stat-num { font-size: 16px; }
            .stats-bar .stat-box .stat-label { font-size: 9px; }

            .order-body { grid-template-columns: 1fr; }
            .products-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
            .product-card { padding: 10px; }
            .product-card img { height: 100px; }
            .customers-grid { grid-template-columns: 1fr; }
            .bottom-nav { height: 56px; }
            .bottom-nav .bn-item .bn-icon { font-size: 18px; }
            .bottom-nav .bn-item .bn-label { font-size: 9px; }
            .bottom-nav .bn-item { max-width: 64px; }
        }

        @media (min-width: 601px) and (max-width: 1024px) {
            .products-grid { grid-template-columns: repeat(3, 1fr); }
        }

        @media (min-width: 1025px) {
            .products-grid { grid-template-columns: repeat(5, 1fr); }
        }
    </style>
</head>
<body>

    <!-- ===== FIXED TOP HEADER (Amazon-style) ===== -->
    <header class="top-header">
        <a href="#" class="header-logo" onclick="switchTab('orders')">
            <span class="logo-icon">🛒</span>
            <span class="logo-text">الشرقاوي<br><span class="logo-sub">لوحة التحكم</span></span>
        </a>

        <div class="header-search">
            <input type="text" id="search-input" placeholder="بحث في الطلبات، المنتجات، العملاء..." oninput="filterCurrentTab()">
            <button onclick="filterCurrentTab()">🔍</button>
        </div>

        <div class="header-actions">
            <button class="ha-btn" onclick="refreshCurrentTab()" title="تحديث">
                <span class="ha-icon">🔄</span>
                <span class="ha-label">تحديث</span>
            </button>
        </div>
    </header>

    <!-- ===== MAIN CONTENT ===== -->
    <main class="main-content">

        <!-- Stats Bar -->
        <div class="stats-bar">
            <div class="stat-box">
                <div class="stat-num" id="total-orders">0</div>
                <div class="stat-label">الطلبات</div>
            </div>
            <div class="stat-box">
                <div class="stat-num" id="total-products">0</div>
                <div class="stat-label">المنتجات</div>
            </div>
            <div class="stat-box">
                <div class="stat-num" id="total-customers">0</div>
                <div class="stat-label">العملاء</div>
            </div>
            <div class="stat-box">

    <script>
        const SUPABASE_URL = "https://zqqpknqexsnskowhiwfj.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpxcXBrbnFleHNuc2tvd2hpd2ZqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExMzE2MjQsImV4cCI6MjA5NjcwNzYyNH0.hcD0__qb6FNhpgAyyU0F7RFZyewJrkt2WR4E79UJP9E";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentTab = 'orders';
        let allOrders = [];
        let allProducts = [];
        let allCustomers = [];
        let allCategories = [];

        const STATUS_MAP = {
            'قيد المراجعة': 'قيد المراجعة',
            'تم التأكيد': 'تم التأكيد',
            'جاري التجهيز': 'جاري التجهيز',
            'تم الشحن': 'تم الشحن',
            'تم التسليم': 'تم التسليم',
            'ملغي': 'ملغي'
        };

        function getStatusClass(status) {
            const map = {
                'قيد المراجعة': 'status-pending',
                'تم التأكيد': 'status-processing',
                'جاري التجهيز': 'status-processing',
                'تم الشحن': 'status-delivered',
                'تم التسليم': 'status-delivered',
                'ملغي': 'status-cancelled'
            };
            return map[status] || 'status-pending';
        }

        function getStatusText(status) { return STATUS_MAP[status] || 'قيد المراجعة'; }

        function updateTime() {
            document.getElementById('last-update').textContent = new Date().toLocaleTimeString('ar-EG');
        }

        async function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.bn-item').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));

            document.querySelector(`.bn-item[onclick="switchTab('${tab}')"]`).classList.add('active');
            document.getElementById(`tab-${tab}`).classList.add('active');

            document.getElementById('search-input').value = '';
            if (tab === 'orders') await loadOrders();
            else if (tab === 'products') { await loadCategories(); await loadProducts(); }
            else if (tab === 'customers') await loadCustomers();
            else if (tab === 'categories') { await loadCategories(); await loadProducts(); }
            else if (tab === 'maintenance') await checkMaintenance();
            updateTime();
        }

        function refreshCurrentTab() {
            if (currentTab === 'orders') loadOrders();
            else if (currentTab === 'products') loadProducts();
            else if (currentTab === 'customers') loadCustomers();
            else if (currentTab === 'categories') loadCategories();
            updateTime();
        }

        function filterCurrentTab() {
            if (currentTab === 'orders') filterOrders();
            else if (currentTab === 'products') filterProducts();
            else if (currentTab === 'customers') filterCustomers();
            else if (currentTab === 'categories') filterCategories();
        }

        // ==================== ORDERS ====================

        async function loadOrders() {
            const container = document.getElementById('orders-container');
            container.innerHTML = '<div class="loading">جاري تحميل الطلبات...</div>';

            const { data, error } = await supabaseClient
                .from('orders')
                .select('*')
                .order('id', { ascending: false });

            if (error) { container.innerHTML = '<div class="error">❌ خطأ: ' + error.message + '</div>'; return; }

            allOrders = data || [];
            document.getElementById('total-orders').textContent = allOrders.length;
            renderOrders(allOrders);
        }

        function renderOrders(orders) {
            const container = document.getElementById('orders-container');
            if (!orders.length) { container.innerHTML = '<div class="empty">لا توجد طلبات</div>'; return; }
            container.innerHTML = orders.map(o => {
                const date = o.created_at ? new Date(o.created_at).toLocaleString('ar-EG') : 'غير محدد';
                return `
                    <div class="order-card">
                        <div class="order-header">
                            <span class="order-id">#${o.id}</span>
                            <span class="order-date">${date}</span>
                        </div>
                        <div class="order-body">
                            <div><div class="label">اسم المتجر</div><div class="value">${o.shop_name || 'غير محدد'}</div></div>
                            <div><div class="label">رقم الهاتف</div><div class="value">${o.phone_number || 'غير محدد'}</div></div>
                            <div style="grid-column:1/-1;"><div class="label">العنوان</div><div class="value">${o.address || 'غير محدد'}</div></div>
                            <div class="order-items"><div class="label">المنتجات</div><div class="items-list">${o.cart_details || 'بدون منتجات'}</div></div>
                        </div>
                        ${o.status === 'تم التسليم' && o.rating ? `
                        <div class="order-rating">
                            <span class="label">التقييم:</span>
                            <span class="rating-stars">${'<span class="star-filled">★</span>'.repeat(o.rating)}${'<span>★</span>'.repeat(5 - o.rating)}</span>
                        </div>` : ''}
                        <div class="order-footer">
                            <span class="status-badge ${getStatusClass(o.status)}">${getStatusText(o.status)}</span>
                            <div>
                                <select class="status-select" id="status-select-${o.id}" data-original="${o.status || 'قيد المراجعة'}">
                                    <option value="قيد المراجعة" ${(o.status||'قيد المراجعة')==='قيد المراجعة'?'selected':''}>قيد المراجعة</option>
                                    <option value="تم التأكيد" ${o.status==='تم التأكيد'?'selected':''}>تم التأكيد</option>
                                    <option value="جاري التجهيز" ${o.status==='جاري التجهيز'?'selected':''}>جاري التجهيز</option>
                                    <option value="تم الشحن" ${o.status==='تم الشحن'?'selected':''}>تم الشحن</option>
                                    <option value="تم التسليم" ${o.status==='تم التسليم'?'selected':''}>تم التسليم</option>
                                    <option value="ملغي" ${o.status==='ملغي'?'selected':''}>ملغي</option>
                                </select>
                                <button class="save-status-btn" onclick="updateOrderStatus(${o.id})">حفظ</button>
                            </div>
                        </div>
                    </div>`;
            }).join('');
        }

        async function updateOrderStatus(id) {
            const select = document.getElementById(`status-select-${id}`);
            const btn = select.nextElementSibling;
            const newStatus = select.value;
            const original = select.dataset.original;
            if (newStatus === original) return;

            btn.disabled = true; btn.textContent = 'جاري الحفظ...';
            const { error } = await supabaseClient.from('orders').update({ status: newStatus }).eq('id', id);
            if (error) {
                alert('❌ خطأ: ' + error.message);
                select.value = original;
            } else {
                select.dataset.original = newStatus;
                const order = allOrders.find(o => o.id === id);
                if (order) order.status = newStatus;
                renderOrders(allOrders);
            }
            btn.disabled = false; btn.textContent = 'حفظ';
        }

        function filterOrders() {
            const q = document.getElementById('search-input').value.trim().toLowerCase();
            if (!q) { renderOrders(allOrders); return; }
            const filtered = allOrders.filter(o =>
                String(o.id).includes(q) ||
                (o.shop_name || '').toLowerCase().includes(q) ||
                (o.phone_number || '').includes(q) ||
                (o.address || '').toLowerCase().includes(q) ||
                (STATUS_MAP[o.status] || '').includes(q)
            );
            renderOrders(filtered);
        }

        // ==================== PRODUCTS ====================

        let reorderMode = false;
        let originalOrder = [];

        async function loadProducts() {
            const container = document.getElementById('products-container');
            container.innerHTML = '<div class="loading">جاري تحميل المنتجات...</div>';

            const { data, error } = await supabaseClient
                .from('products')
                .select('*')
                .order('sort_order', { ascending: true })
                .order('id', { ascending: true });

            if (error) { container.innerHTML = '<div class="error">❌ خطأ: ' + error.message + '</div>'; return; }

            allProducts = data || [];
            originalOrder = allProducts.map(p => ({ id: p.id, sort_order: p.sort_order }));
            document.getElementById('total-products').textContent = allProducts.length;
            renderProducts(allProducts);
        }

        function renderProducts(products) {
            const container = document.getElementById('products-container');
            if (!products.length) { container.innerHTML = '<div class="empty">لا توجد منتجات. أضف منتج جديد أو استورد من الموقع.</div>'; return; }

            const categories = {};
            products.forEach(p => {
                const cat = p.category || 'بدون تصنيف';
                if (!categories[cat]) categories[cat] = [];
                categories[cat].push(p);
            });

            const catOrder = {};
            allCategories.forEach((c, i) => { catOrder[c.name] = c.sort_order ?? i; });

            const sortedCats = Object.entries(categories).sort((a, b) => {
                return (catOrder[a[0]] ?? 999) - (catOrder[b[0]] ?? 999);
            });

            let html = '';
            for (const [catName, catProducts] of sortedCats) {
                html += `<div class="admin-section-box">`;
                html += `<div class="admin-section-title">📁 ${catName}</div>`;
                html += `<div class="admin-products-grid">`;
                catProducts.sort((a, b) => (a.sort_order ?? 0) - (b.sort_order ?? 0));
                catProducts.forEach((p, i) => {
                    const img = p.images ? p.images.split(',')[0].trim() : '';
                    const hasValidImg = img && (img.startsWith('http://') || img.startsWith('https://'));
                    const arrows = reorderMode ? `
                        <div class="p-reorder" onclick="event.stopPropagation()">
                            <button onclick="moveProduct(${p.id}, 'up')" ${i === 0 ? 'disabled' : ''}>▲</button>
                            <button onclick="moveProduct(${p.id}, 'down')" ${i === catProducts.length - 1 ? 'disabled' : ''}>▼</button>
                        </div>` : '';
                    html += `
                        <div class="product-card ${reorderMode ? 'reorder-active' : ''}" onclick="${reorderMode ? '' : 'openProductModal('+p.id+')'}">
                            ${hasValidImg ? `<img src="${img}" onerror="this.style.display='none'">` : '<div style="height:130px;display:flex;align-items:center;justify-content:center;color:#555;font-size:36px;">📦</div>'}
                            <div class="p-name">${p.name}</div>
                            <div class="p-price">${p.price} ج.م</div>
                            ${arrows}
                        </div>`;
                });
                html += `</div></div>`;
            }
            container.innerHTML = html;
        }

        function toggleReorderMode() {
            reorderMode = !reorderMode;
            document.getElementById('reorder-toggle-btn').style.display = reorderMode ? 'none' : '';
            document.getElementById('reorder-save-btn').style.display = reorderMode ? '' : 'none';
            document.getElementById('reorder-cancel-btn').style.display = reorderMode ? '' : 'none';
            renderProducts(allProducts);
        }

        function moveProduct(id, direction) {
            const idx = allProducts.findIndex(p => p.id === id);
            if (idx === -1) return;
            const swapIdx = direction === 'up' ? idx - 1 : idx + 1;
            if (swapIdx < 0 || swapIdx >= allProducts.length) return;
            if (allProducts[idx].category !== allProducts[swapIdx].category) return;

            const temp = allProducts[idx];
            allProducts[idx] = allProducts[swapIdx];
            allProducts[swapIdx] = temp;
            renderProducts(allProducts);
        }

        async function saveReorder() {
            const updates = allProducts.map((p, i) => {
                return supabaseClient.from('products').update({ sort_order: i }).eq('id', p.id);
            });
            await Promise.all(updates);
            originalOrder = allProducts.map(p => ({ id: p.id, sort_order: p.sort_order }));
            reorderMode = false;
            document.getElementById('reorder-toggle-btn').style.display = '';
            document.getElementById('reorder-save-btn').style.display = 'none';
            document.getElementById('reorder-cancel-btn').style.display = 'none';
            await loadProducts();
            alert('✅ تم حفظ الترتيب');
        }

        function cancelReorder() {
            originalOrder.forEach(o => {
                const p = allProducts.find(x => x.id === o.id);
                if (p) p.sort_order = o.sort_order;
            });
            allProducts.sort((a, b) => (a.sort_order ?? 0) - (b.sort_order ?? 0));
            reorderMode = false;
            document.getElementById('reorder-toggle-btn').style.display = '';
            document.getElementById('reorder-save-btn').style.display = 'none';
            document.getElementById('reorder-cancel-btn').style.display = 'none';
            renderProducts(allProducts);
        }

        function filterProducts() {
            const q = document.getElementById('search-input').value.trim().toLowerCase();
            if (!q) { renderProducts(allProducts); return; }
            const filtered = allProducts.filter(p =>
                p.name.toLowerCase().includes(q) ||
                (p.category || '').toLowerCase().includes(q) ||
                String(p.price).includes(q)
            );
            renderProducts(filtered);
        }

        function openProductModal(id) {
            const modal = document.getElementById('product-modal');
            const title = document.getElementById('product-modal-title');
            const deleteBtn = document.getElementById('p-delete-btn');

            // Populate category dropdown
            const catSelect = document.getElementById('p-category');
            const currentCat = catSelect.value;
            catSelect.innerHTML = '<option value="">بدون تصنيف</option>';
            allCategories.forEach(c => {
                catSelect.innerHTML += `<option value="${c.name}">${c.name}</option>`;
            });

            if (id) {
                const p = allProducts.find(x => x.id === id);
                if (!p) return;
                title.textContent = 'تعديل منتج';
                document.getElementById('p-id').value = p.id;
                document.getElementById('p-name').value = p.name;
                document.getElementById('p-price').value = p.price;
                document.getElementById('p-pack').value = p.pack || 'العلبة 24 قطعة';
                document.getElementById('p-images').value = p.images || '';
                document.getElementById('p-category').value = p.category || '';
                updateImagePreview();
                deleteBtn.style.display = 'block';
            } else {
                title.textContent = 'إضافة منتج';
                ['p-id','p-name','p-price','p-pack','p-images'].forEach(id => document.getElementById(id).value = '');
                document.getElementById('p-category').value = '';
                document.getElementById('p-pack').value = 'العلبة 24 قطعة';
                document.getElementById('p-image-preview').innerHTML = '';
                deleteBtn.style.display = 'none';
            }
            modal.showModal();
        }

        function closeProductModal() {
            document.getElementById('product-modal').close();
        }

        document.getElementById('p-images').addEventListener('input', updateImagePreview);

        function updateImagePreview() {
            const container = document.getElementById('p-image-preview');
            const urls = document.getElementById('p-images').value.split(',').map(s => s.trim()).filter(Boolean);
            container.innerHTML = urls.slice(0, 3).map(url =>
                url.startsWith('http://') || url.startsWith('https://')
                    ? `<img src="${url}" style="width:54px;height:54px;object-fit:cover;border-radius:6px;border:1px solid #333;" onerror="this.style.display='none'">`
                    : `<div style="width:54px;height:54px;display:flex;align-items:center;justify-content:center;background:#222;border-radius:6px;font-size:22px;border:1px solid #444;" title="${url}">📦</div>`
            ).join('');
        }

        async function saveProduct() {
            const id = document.getElementById('p-id').value;
            const name = document.getElementById('p-name').value.trim();
            const price = parseFloat(document.getElementById('p-price').value);
            const pack = document.getElementById('p-pack').value.trim();
            const images = document.getElementById('p-images').value.trim();
            const category = document.getElementById('p-category').value;

            if (!name || isNaN(price)) { alert('⚠️ اسم المنتج والسعر مطلوبان'); return; }

            let sort_order = 0;
            if (!id && category) {
                const sameCategory = allProducts.filter(p => p.category === category);
                sort_order = sameCategory.length > 0 ? Math.max(...sameCategory.map(p => p.sort_order ?? 0)) + 1 : 0;
            } else if (!id) {
                sort_order = allProducts.length;
            }

            const data = { name, price, pack, images, category, sort_order };

            let error;
            if (id) {
                const res = await supabaseClient.from('products').update(data).eq('id', id);
                error = res.error;
            } else {
                const res = await supabaseClient.from('products').insert([data]);
                error = res.error;
            }

            if (error) { alert('❌ خطأ: ' + error.message); return; }

            closeProductModal();
            await loadProducts();
            alert('✅ تم الحفظ بنجاح');
        }

        async function deleteProductById(id) {
            if (!confirm('⚠️ هل أنت متأكد من حذف هذا المنتج؟')) return;
            const { error } = await supabaseClient.from('products').delete().eq('id', id);
            if (error) { alert('❌ خطأ: ' + error.message); return; }
            await loadProducts();
        }

        function deleteProduct() {
            const id = document.getElementById('p-id').value;
            if (id) deleteProductById(parseInt(id));
        }

        async function deleteAllProducts() {
            if (!confirm('⚠️ هل أنت متأكد من حذف جميع المنتجات؟ هذه العملية لا يمكن التراجع عنها!')) return;
            if (!confirm('⚠️ تأكيد أخير: سيتم حذف كل المنتجات نهائياً!')) return;

            const { error } = await supabaseClient.from('products').delete().neq('id', 0);
            if (error) { alert('❌ خطأ: ' + error.message); return; }

            await loadProducts();
            alert('✅ تم حذف جميع المنتجات بنجاح');
        }

        async function importProducts() {
            if (!confirm('هذه العملية ستجلب المنتجات من الموقع الرئيسي وتضيفها لقاعدة البيانات. هل تريد الاستمرار؟')) return;

            const container = document.getElementById('products-container');
            container.innerHTML = '<div class="loading">جاري استيراد المنتجات...</div>';

            try {
                const res = await fetch('https://sharkawey.netlify.app');
                const html = await res.text();
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');

                const products = [];
                doc.querySelectorAll('.a1').forEach(card => {
                    const nameEl = card.querySelector('p');
                    const imgEl = card.querySelector('img');
                    const btn = card.querySelector('.order-button');
                    const name = nameEl ? nameEl.textContent.trim() : '';
                    const img = imgEl ? (imgEl.getAttribute('src') || '').trim() : '';
                    let price = 0;
                    if (btn) {
                        const m = btn.getAttribute('onclick')?.match(/addToCart\('[^']*',\s*(\d+)\)/);
                        if (m) price = parseInt(m[1]);
                    }
                    let category = '';
                    const section = card.closest('.section-box');
                    if (section) category = section.getAttribute('data-category') || '';

                    if (name && price > 0) {
                        products.push({ name, price, images: img, category, pack: 'العلبة 24 قطعة', description: '' });
                    }
                });

                if (!products.length) { container.innerHTML = '<div class="error">❌ لم يتم العثور على منتجات</div>'; return; }

                const { error } = await supabaseClient.from('products').insert(products);
                if (error) { container.innerHTML = '<div class="error">❌ خطأ في الاستيراد: ' + error.message + '</div>'; return; }

                alert(`✅ تم استيراد ${products.length} منتج بنجاح`);
                loadProducts();

            } catch (e) {
                container.innerHTML = '<div class="error">❌ فشل الاتصال بالموقع: ' + e.message + '</div>';
            }
        }

        async function importFromFile(input) {
            const file = input.files[0];
            if (!file) return;
            const container = document.getElementById('products-container');
            container.innerHTML = '<div class="loading">جاري استيراد المنتجات...</div>';

            try {
                const html = await file.text();
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');

                const products = [];
                doc.querySelectorAll('.section-box').forEach(section => {
                    const category = section.getAttribute('data-category') || '';
                    section.querySelectorAll('.a1').forEach(card => {
                        const nameEl = card.querySelector('p');
                        const imgEl = card.querySelector('img');
                        const btn = card.querySelector('.order-button');
                        const name = nameEl ? nameEl.textContent.trim() : '';
                        const img = imgEl ? (imgEl.getAttribute('src') || '').trim() : '';
                        let price = 0;
                        if (btn) {
                            const m = btn.getAttribute('onclick')?.match(/addToCart\('[^']*',\s*(\d+)\)/);
                            if (m) price = parseInt(m[1]);
                        }
                        if (name && price > 0) {
                            products.push({ name, price, images: img, category, pack: 'العلبة 24 قطعة', description: '' });
                        }
                    });
                });

                if (!products.length) { container.innerHTML = '<div class="error">❌ لم يتم العثور على منتجات</div>'; return; }

                const { error } = await supabaseClient.from('products').insert(products);
                if (error) { container.innerHTML = '<div class="error">❌ خطأ: ' + error.message + '</div>'; return; }

                alert(`✅ تم استيراد ${products.length} منتج بنجاح`);
                loadProducts();
            } catch (e) {
                container.innerHTML = '<div class="error">❌ فشل: ' + e.message + '</div>';
            }
            input.value = '';
        }

        // ==================== CATEGORIES ====================

        async function loadCategories() {
            const container = document.getElementById('categories-container');
            container.innerHTML = '<div class="loading">جاري تحميل التصنيفات...</div>';

            let { data, error } = await supabaseClient
                .from('categories')
                .select('*')
                .order('sort_order', { ascending: true, nullsFirst: true });

            if (error) {
                const res2 = await supabaseClient.from('categories').select('*').order('id', { ascending: true });
                data = res2.data || [];
            }

            allCategories = data || [];
            allCategories.forEach((c, i) => { if (c.sort_order == null) c.sort_order = i; });
            originalCatOrder = allCategories.map(c => ({ id: c.id, sort_order: c.sort_order }));
            renderCategories(allCategories);
        }

        let catReorderMode = false;
        let originalCatOrder = [];

        function renderCategories(categories) {
            const container = document.getElementById('categories-container');
            if (!categories.length) { container.innerHTML = '<div class="empty">لا توجد تصنيفات</div>'; return; }

            container.innerHTML = categories.map((c, i) => {
                const arrows = catReorderMode ? `
                    <div class="p-reorder" onclick="event.stopPropagation()" style="display:flex;gap:4px;margin-top:6px;justify-content:center;">
                        <button onclick="moveCategory(${c.id}, 'up')" ${i === 0 ? 'disabled' : ''}>▲</button>
                        <button onclick="moveCategory(${c.id}, 'down')" ${i === categories.length - 1 ? 'disabled' : ''}>▼</button>
                    </div>` : '';
                return `
                    <div class="order-card ${catReorderMode ? 'reorder-active' : ''}" style="cursor:${catReorderMode ? 'grab' : 'pointer'};" onclick="${catReorderMode ? '' : 'openCategoryModal('+c.id+')'}">
                        <div class="order-header">
                            <span class="order-id">📁 ${c.name}</span>
                            <span class="order-date">ترتيب: ${c.sort_order || 0}</span>
                        </div>
                        ${arrows}
                        ${!catReorderMode ? `<div class="order-footer" style="border-top:none;padding-top:0;margin-top:0;">
                            <button class="save-status-btn" onclick="event.stopPropagation();deleteCategoryById(${c.id})" style="background:#f44336;">🗑️ حذف</button>
                        </div>` : ''}
                    </div>`;
            }).join('');
        }

        function toggleCatReorderMode() {
            catReorderMode = !catReorderMode;
            document.getElementById('cat-reorder-toggle-btn').style.display = catReorderMode ? 'none' : '';
            document.getElementById('cat-reorder-save-btn').style.display = catReorderMode ? '' : 'none';
            document.getElementById('cat-reorder-cancel-btn').style.display = catReorderMode ? '' : 'none';
            renderCategories(allCategories);
        }

        function moveCategory(id, direction) {
            const idx = allCategories.findIndex(c => c.id === id);
            if (idx === -1) return;
            const swapIdx = direction === 'up' ? idx - 1 : idx + 1;
            if (swapIdx < 0 || swapIdx >= allCategories.length) return;
            const temp = allCategories[idx];
            allCategories[idx] = allCategories[swapIdx];
            allCategories[swapIdx] = temp;
            renderCategories(allCategories);
        }

        async function saveCatReorder() {
            allCategories.forEach((c, i) => { c.sort_order = i; });
            const updates = allCategories.map((c) => {
                return supabaseClient.from('categories').update({ sort_order: c.sort_order }).eq('id', c.id);
            });
            await Promise.all(updates);
            originalCatOrder = allCategories.map(c => ({ id: c.id, sort_order: c.sort_order }));
            catReorderMode = false;
            document.getElementById('cat-reorder-toggle-btn').style.display = '';
            document.getElementById('cat-reorder-save-btn').style.display = 'none';
            document.getElementById('cat-reorder-cancel-btn').style.display = 'none';
            await loadCategories();
            await loadProducts();
            alert('✅ تم حفظ ترتيب الأقسام');
        }

        function cancelCatReorder() {
            originalCatOrder.forEach(o => {
                const c = allCategories.find(x => x.id === o.id);
                if (c) c.sort_order = o.sort_order;
            });
            allCategories.sort((a, b) => (a.sort_order ?? 0) - (b.sort_order ?? 0));
            catReorderMode = false;
            document.getElementById('cat-reorder-toggle-btn').style.display = '';
            document.getElementById('cat-reorder-save-btn').style.display = 'none';
            document.getElementById('cat-reorder-cancel-btn').style.display = 'none';
            renderCategories(allCategories);
        }

        function filterCategories() {
            const q = document.getElementById('search-input').value.trim().toLowerCase();
            if (!q) { renderCategories(allCategories); return; }
            const filtered = allCategories.filter(c => c.name.toLowerCase().includes(q));
            renderCategories(filtered);
        }

        function openCategoryModal(id) {
            const modal = document.getElementById('category-modal');
            const title = document.getElementById('category-modal-title');
            const deleteBtn = document.getElementById('c-delete-btn');

            if (id) {
                const c = allCategories.find(x => x.id === id);
                if (!c) return;
                title.textContent = 'تعديل تصنيف';
                document.getElementById('c-id').value = c.id;
                document.getElementById('c-name').value = c.name;
                document.getElementById('c-sort').value = c.sort_order || 1;
                deleteBtn.style.display = 'block';
            } else {
                title.textContent = 'إضافة تصنيف';
                document.getElementById('c-id').value = '';
                document.getElementById('c-name').value = '';
                document.getElementById('c-sort').value = allCategories.length + 1;
                deleteBtn.style.display = 'none';
            }
            modal.showModal();
        }

        function closeCategoryModal() {
            document.getElementById('category-modal').close();
        }

        async function saveCategory() {
            const id = document.getElementById('c-id').value;
            const name = document.getElementById('c-name').value.trim();
            const sort_order = parseInt(document.getElementById('c-sort').value) || 1;

            if (!name) { alert('⚠️ اسم التصنيف مطلوب'); return; }

            let error;

            if (id) {
                const oldCat = allCategories.find(c => c.id === parseInt(id));
                if (oldCat && oldCat.name !== name) {
                    await supabaseClient.from('products').update({ category: name }).eq('category', oldCat.name);
                }
                const res = await supabaseClient.from('categories').update({ name, sort_order }).eq('id', id);
                error = res.error;
            } else {
                const res = await supabaseClient.from('categories').insert([{ name, sort_order }]);
                error = res.error;
            }

            if (error) { alert('❌ خطأ: ' + error.message); return; }

            closeCategoryModal();
            loadCategories();
            loadProducts();
            alert('✅ تم الحفظ بنجاح');
        }

        async function deleteCategoryById(id) {
            if (!confirm('⚠️ هل أنت متأكد من حذف هذا التصنيف؟')) return;
            const { error } = await supabaseClient.from('categories').delete().eq('id', id);
            if (error) { alert('❌ خطأ: ' + error.message); return; }
            await loadCategories();
            await loadProducts();
        }

        function deleteCategory() {
            const id = document.getElementById('c-id').value;
            if (id) deleteCategoryById(parseInt(id));
        }

        // ==================== MAINTENANCE ====================

        async function checkMaintenance() {
            try {
                const { data } = await supabaseClient
                    .from('maintenance')
                    .select('is_active, updated_at')
                    .eq('id', 1)
                    .single();

                if (data) {
                    updateMaintenanceUI(data.is_active);
                    if (data.updated_at) {
                        document.getElementById('maintenance-date').textContent =
                            new Date(data.updated_at).toLocaleString('ar-EG');
                    }
                }
            } catch (e) {
                console.log('Maintenance table not found. Run the SQL to create it.');
            }
        }

        function updateMaintenanceUI(isActive) {
            const toggle = document.getElementById('maintenance-toggle');
            const badge = document.getElementById('maintenance-badge');
            const stateText = document.getElementById('maintenance-state');

            if (isActive) {
                toggle.classList.add('on');
                badge.className = 'maintenance-status on';
                badge.textContent = '⚠️ الصيانة مفعلة';
                stateText.textContent = 'مفعّل';
            } else {
                toggle.classList.remove('on');
                badge.className = 'maintenance-status off';
                badge.textContent = '✅ الموقع متاح';
                stateText.textContent = 'مغلق';
            }
        }

        async function toggleMaintenance() {
            try {
                const { data } = await supabaseClient
                    .from('maintenance')
                    .select('is_active')
                    .eq('id', 1)
                    .single();

                const newState = !data.is_active;

                await supabaseClient
                    .from('maintenance')
                    .update({ is_active: newState, updated_at: new Date().toISOString() })
                    .eq('id', 1);

                updateMaintenanceUI(newState);
                document.getElementById('maintenance-date').textContent =
                    new Date().toLocaleString('ar-EG');
            } catch (e) {
                alert('❌ تأكد من إنشاء جدول maintenance في Supabase أولاً');
            }
        }

        // ==================== CUSTOMERS ====================

        async function loadCustomers() {
            const container = document.getElementById('customers-container');
            container.innerHTML = '<div class="loading">جاري تحميل العملاء...</div>';

            const { data, error } = await supabaseClient
                .from('profiles')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) { container.innerHTML = '<div class="error">❌ خطأ: ' + error.message + '</div>'; return; }

            allCustomers = data || [];

            const { data: ordersData } = await supabaseClient.from('orders').select('phone_number');
            const orderCounts = {};
            if (ordersData) {
                ordersData.forEach(o => { orderCounts[o.phone_number] = (orderCounts[o.phone_number] || 0) + 1; });
            }

            allCustomers.forEach(c => { c.orderCount = orderCounts[c.phone_number] || 0; });

            document.getElementById('total-customers').textContent = allCustomers.length;
            renderCustomers(allCustomers);
        }

        function renderCustomers(customers) {
            const container = document.getElementById('customers-container');
            if (!customers.length) { container.innerHTML = '<div class="empty">لا يوجد عملاء</div>'; return; }

            container.innerHTML = `
            <div class="customers-grid">
                ${customers.map(c => {
                    const date = c.created_at ? new Date(c.created_at).toLocaleString('ar-EG') : '';
                    return `
                        <div class="customer-card">
                            <div class="c-name">🏪 ${c.shop_name || 'غير محدد'}</div>
                            <div class="c-phone">📞 ${c.phone_number || 'غير محدد'}</div>
                            <div class="c-address">📍 ${c.address || 'غير محدد'}</div>
                            ${date ? `<div class="c-date">🕐 أول طلب: ${date}</div>` : ''}
                            <div class="c-orders-count">📦 ${c.orderCount} طلب</div>
                        </div>`;
                }).join('')}
            </div>`;
        }

        function filterCustomers() {
            const q = document.getElementById('search-input').value.trim().toLowerCase();
            if (!q) { renderCustomers(allCustomers); return; }
            const filtered = allCustomers.filter(c =>
                (c.shop_name || '').toLowerCase().includes(q) ||
                (c.phone_number || '').includes(q) ||
                (c.address || '').toLowerCase().includes(q)
            );
            renderCustomers(filtered);
        }

        // Init
        loadOrders();
        loadCategories();
        updateTime();
        checkMaintenance();
    </script>
</body>
</html>
