<!doctype html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم الشرقاوي - الطلبات</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', sans-serif;
            background: #111;
            color: #eee;
            padding: 20px;
            min-height: 100vh;
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .header h1 {
            font-size: 24px;
            font-weight: 800;
            color: #ff9800;
        }
        .header .stats {
            display: flex;
            gap: 16px;
            font-size: 14px;
            color: #aaa;
        }
        .header .stats span {
            background: #1a1a1a;
            padding: 8px 16px;
            border-radius: 10px;
            border: 1px solid #2a2a2a;
        }
        .header .stats strong {
            color: #ff9800;
        }
        .refresh-btn {
            background: #ff9800;
            color: #fff;
            border: none;
            padding: 10px 24px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 700;
            font-family: 'Cairo', sans-serif;
            cursor: pointer;
            transition: 0.2s;
        }
        .refresh-btn:hover {
            background: #f57c00;
            transform: translateY(-1px);
        }
        .search-bar {
            width: 100%;
            max-width: 400px;
            padding: 12px 16px;
            border: 1px solid #333;
            border-radius: 10px;
            background: #1a1a1a;
            color: #eee;
            font-size: 14px;
            font-family: 'Cairo', sans-serif;
            outline: none;
            transition: 0.2s;
        }
        .search-bar:focus {
            border-color: #ff9800;
        }
        .orders-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .order-card {
            background: linear-gradient(145deg, #1a1a1a, #222);
            border: 1px solid #2a2a2a;
            border-radius: 14px;
            padding: 18px 20px;
            border-right: 3px solid #ff9800;
            transition: 0.2s;
        }
        .order-card:hover {
            border-color: #444;
        }
        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .order-id {
            font-weight: 700;
            font-size: 15px;
            color: #ff9800;
        }
        .order-date {
            font-size: 12px;
            color: #888;
        }
        .order-body {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px 16px;
            font-size: 14px;
        }
        .order-body .label {
            color: #888;
            font-size: 12px;
        }
        .order-body .value {
            color: #eee;
            font-weight: 600;
        }
        .order-items {
            grid-column: 1 / -1;
            margin-top: 4px;
        }
        .order-items .label {
            margin-bottom: 4px;
        }
        .order-items .items-list {
            background: rgba(255,255,255,0.03);
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 13px;
            color: #ccc;
            line-height: 1.8;
            white-space: pre-line;
            font-weight: 500;
        }
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: #888;
            font-size: 16px;
        }
        .empty {
            text-align: center;
            padding: 60px 20px;
            color: #666;
            font-size: 16px;
        }
        .error {
            text-align: center;
            padding: 60px 20px;
            color: #ff4444;
            font-size: 16px;
        }
        @media (max-width: 600px) {
            body { padding: 12px; }
            .header h1 { font-size: 20px; }
            .order-body { grid-template-columns: 1fr; }
            .search-bar { max-width: 100%; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div>
            <h1>📋 لوحة تحكم الشرقاوي</h1>
            <div class="stats">
                <span>إجمالي الطلبات: <strong id="total-count">0</strong></span>
                <span>آخر تحديث: <strong id="last-update">-</strong></span>
            </div>
        </div>
        <button class="refresh-btn" onclick="loadOrders()">🔄 تحديث</button>
    </div>
    <input type="text" class="search-bar" id="search-input" placeholder="🔍 بحث برقم الطلب أو اسم المتجر أو الهاتف..." oninput="filterOrders()">
    <div id="orders-container" class="orders-grid"><div class="loading">جاري تحميل الطلبات...</div></div>

    <script>
        const SUPABASE_URL = "https://zqqpknqexsnskowhiwfj.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpxcXBrbnFleHNuc2tvd2hpd2ZqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExMzE2MjQsImV4cCI6MjA5NjcwNzYyNH0.hcD0__qb6FNhpgAyyU0F7RFZyewJrkt2WR4E79UJP9E";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let allOrders = [];

        async function loadOrders() {
            const container = document.getElementById('orders-container');
            container.innerHTML = '<div class="loading">جاري تحميل الطلبات...</div>';

            const { data, error } = await supabaseClient
                .from('orders')
                .select('*')
                .order('id', { ascending: false });

            if (error) {
                container.innerHTML = '<div class="error">❌ خطأ: ' + error.message + '</div>';
                return;
            }

            allOrders = data || [];
            document.getElementById('total-count').textContent = allOrders.length;
            document.getElementById('last-update').textContent = new Date().toLocaleTimeString('ar-EG');
            renderOrders(allOrders);
        }

        function renderOrders(orders) {
            const container = document.getElementById('orders-container');
            if (!orders.length) {
                container.innerHTML = '<div class="empty">لا توجد طلبات</div>';
                return;
            }
            container.innerHTML = orders.map(o => {
                const date = o.created_at ? new Date(o.created_at).toLocaleString('ar-EG') : 'غير محدد';
                return `
                    <div class="order-card">
                        <div class="order-header">
                            <span class="order-id">#${o.id}</span>
                            <span class="order-date">${date}</span>
                        </div>
                        <div class="order-body">
                            <div>
                                <div class="label">اسم المتجر</div>
                                <div class="value">${o.shop_name || 'غير محدد'}</div>
                            </div>
                            <div>
                                <div class="label">رقم الهاتف</div>
                                <div class="value">${o.phone_number || 'غير محدد'}</div>
                            </div>
                            <div style="grid-column: 1/-1;">
                                <div class="label">العنوان</div>
                                <div class="value">${o.address || 'غير محدد'}</div>
                            </div>
                            <div class="order-items">
                                <div class="label">المنتجات</div>
                                <div class="items-list">${o.cart_details || 'بدون منتجات'}</div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function filterOrders() {
            const q = document.getElementById('search-input').value.trim().toLowerCase();
            if (!q) { renderOrders(allOrders); return; }
            const filtered = allOrders.filter(o =>
                String(o.id).includes(q) ||
                (o.shop_name || '').toLowerCase().includes(q) ||
                (o.phone_number || '').includes(q) ||
                (o.address || '').toLowerCase().includes(q)
            );
            renderOrders(filtered);
        }

        loadOrders();
    </script>
</body>
</html>
